name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Persistence milestone quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      TAKT_TEST_POSTGRES_URL: postgresql://postgres@127.0.0.1:5432/takt_test
    services:
      postgres:
        image: postgres:16.9-alpine@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
        env:
          POSTGRES_DB: takt_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username postgres --dbname takt_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0

      - name: Install pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install pinned Rust components
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt

      - name: Install pinned Rust policy tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2

      - name: Install locked Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Check architecture and generated-code drift
        run: |
          pnpm check:architecture
          pnpm check:tracking
          pnpm check:generated
          pnpm check:secrets

      - name: Test repository tools
        run: pnpm test:tools

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test Rust
        run: cargo test --workspace --all-features

      - name: Check Rust dependencies
        run: |
          cargo deny check
          cargo audit

      - name: Check Node dependencies
        run: |
          pnpm audit --audit-level high
          pnpm check:licenses

      - name: Lint and test web application
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test --run

      - name: Build and browser-test web application
        run: |
          pnpm build
          pnpm playwright test

      - name: Build embedded production server
        run: cargo build --workspace --all-features --release --locked
