schema_version: 1
packages:
  - id: GOV-001
    release: cross-release
    status: implemented
    requirements: [PRD-API-002]
    findings: []
    depends_on: []
    outcome: Versionierte Requirement-, Work-Package- und Findings-Register mit automatischem Konsistenz-Gate.
    acceptance:
      - Alle 57 kanonischen PRD-IDs kommen im Ledger genau einmal vor.
      - Unbekannte IDs, fehlende Pakete, unbekannte Abhängigkeiten und Paketzyklen lassen den Gate-Test fehlschlagen.
    evidence:
      - node --test tools/check-implementation-tracking.test.mjs
      - pnpm check:tracking

  - id: GOV-003
    release: cross-release
    status: implemented
    requirements: []
    findings: []
    depends_on: [GOV-001]
    outcome: Automatischer Größen- und Validierungs-Preflight vor Beginn jedes neuen Arbeitspakets.
    preflight:
      in_scope:
        - Tracking-Metadaten und Validator für Scope, Ausschlüsse, Artefakte, Zeilen- und Validierungsbudget.
        - Warnung ab 600 geschätzten handgeschriebenen Zeilen und harte Grenzen bei 800 Zeilen beziehungsweise 30 Minuten.
      out_of_scope:
        - Rückwirkende Schätzungen für bereits abgeschlossene oder nur geplante Pakete.
        - Automatische Messung tatsächlicher Diff-Zeilen oder Laufzeiten.
      affected_artifacts:
        - docs/implementation-tracking/README.md
        - docs/implementation-tracking/current-status.md
        - docs/implementation-tracking/findings.yaml
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-evidence/gov-003-package-preflight.md
        - tools/check-implementation-tracking.mjs
        - tools/check-implementation-tracking.test.mjs
      estimated_handwritten_lines: 280
      estimated_validation_minutes: 10
    acceptance:
      - Ein in_progress-Paket ohne vollständigen Preflight lässt pnpm check:tracking fehlschlagen.
      - Schätzungen über 800 Zeilen oder 30 Minuten schlagen fehl; ab 600 Zeilen wird ohne Gate-Fehler gewarnt.
    evidence:
      - docs/implementation-evidence/gov-003-package-preflight.md
      - node --test tools/check-implementation-tracking.test.mjs
      - pnpm check:tracking

  - id: GOV-002
    release: cross-release
    status: implemented
    requirements: [PRD-API-002]
    findings: [SEC-001]
    depends_on: [GOV-001]
    outcome: Gepatchter YAML-Parser im OpenAPI-Codegen-Tooling ohne High-Severity-Advisory.
    preflight:
      in_scope:
        - Regressionsschutz fuer die minimale sichere js-yaml-Version im committed pnpm-Lockfile.
        - Gepinnte transitive Aufloesung auf js-yaml 4.3.0 oder neuer ohne Audit-Ausnahme.
        - Node-, Contract-, Generated-Drift-, Tracking- und Evidence-Validierung fuer GOV-002.
      out_of_scope:
        - Aenderungen an OpenAPI-Semantik, generierten API-Typen oder Produktlaufzeit.
        - Allgemeine Dependency-Upgrades ausserhalb des betroffenen js-yaml-Pfads.
        - Unabhaengige Clean-Checkout-Releasefreigabe und PostgreSQL-Evidence.
      affected_artifacts:
        - pnpm-workspace.yaml
        - pnpm-lock.yaml
        - tools/node-supply-chain.test.mjs
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/findings.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/gov-002-node-supply-chain.md
      estimated_handwritten_lines: 120
      estimated_validation_minutes: 25
    acceptance:
      - Der transitive `js-yaml`-Pfad verwendet mindestens Version 4.3.0.
      - Contract-, Generated-Drift- und vollständiger Node-Audit-Gate bleiben grün.
    evidence:
      - pnpm audit --audit-level high
      - pnpm contracts:validate und pnpm check:generated

  - id: CORE-001
    release: "0.1"
    status: implemented
    requirements: [PRD-API-002, PRD-MON-007, PRD-NFR-001, PRD-NFR-003, PRD-NFR-008, PRD-NFR-010]
    findings: [EVID-001]
    depends_on: []
    outcome: Gepinnter Monorepo-Bootstrap mit Health/Readiness, eingebettetem Web-Build und generierten OpenAPI-/Proto-Typen.
    acceptance:
      - Health-Endpunkte antworten über einen echten TCP-Listener vertragstreu und redigiert.
      - Contract-, Architektur- und Generated-Drift-Gates laufen reproduzierbar.
    evidence:
      - docs/implementation-evidence/bootstrap.md
      - docs/implementation-evidence/evid-001-independent-head-validation.md

  - id: DATA-001
    release: "0.1"
    status: implemented
    requirements: [PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-IAM-001, PRD-IAM-003, PRD-IAM-004, PRD-IAM-005, PRD-NFR-001, PRD-NFR-002, PRD-NFR-005, PRD-NFR-007, PRD-NFR-008, PRD-NFR-010]
    findings: [SPEC-001, EVID-001]
    depends_on: [CORE-001]
    outcome: Äquivalente PostgreSQL-/SQLite-Identitätspersistenz, Default-Kontext, lokaler Owner-Bootstrap und append-only Bootstrap-Audit.
    acceptance:
      - Dieselbe Repository-Suite läuft auf SQLite und echtem PostgreSQL 16.
      - Bootstrap ist atomar, idempotent, nebenläufig sicher und gibt keine Zugangsdaten aus.
    evidence:
      - docs/implementation-evidence/persistence-admin-bootstrap.md
      - docs/implementation-evidence/evid-001-independent-head-validation.md

  - id: SPEC-010
    release: "0.1"
    status: implemented
    requirements: [PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-IAM-001, PRD-IAM-003, PRD-NFR-002, PRD-NFR-005, PRD-NFR-007]
    findings: [SPEC-001]
    depends_on: [GOV-001]
    outcome: Kanonische, durchgängig verwendete Requirement-IDs für Daten- und Migrationsverhalten.
    acceptance:
      - SPEC-001 ist durch einen reviewten Spec-Change entschieden.
      - Keine nicht kanonische PRD-ID bleibt außerhalb historischer Evidence übrig.
    evidence:
      - docs/implementation-evidence/spec-010-data-requirements.md
      - pnpm check:tracking ohne unknown-requirement-Ausnahmen
      - Review-Diff von Kapitel 00, Kapitel 10, Migrationen und betroffenen Tests

  - id: SPEC-011
    release: "0.3"
    status: planned
    requirements: []
    findings: [SPEC-002]
    depends_on: [GOV-001]
    outcome: Normative Requirement-ID und Acceptance-Tag für Monitorabhängigkeiten.
    acceptance:
      - Kapitel 00, Kapitel 10 und v0.3.feature referenzieren dieselbe neue ID.
      - DAG-, Sichtbarkeits- und Notification-Suppression-Semantik bleiben unverändert beschrieben.
    evidence:
      - pnpm contracts:gherkin
      - pnpm check:tracking

  - id: SPEC-012
    release: "0.1"
    status: implemented
    requirements: [PRD-API-001, PRD-API-002, PRD-API-005, PRD-IAM-001, PRD-IAM-005]
    findings: [SPEC-003]
    depends_on: [GOV-001]
    outcome: Reviewter OpenAPI-Vertrag für Browser-Login, Logout, Session, Recovery und CSRF.
    acceptance:
      - Cookie-, CSRF-, Rotations-, Ablauf-, Rate-Limit- und generische Login-/Recovery-Fehlerregeln sind vertraglich testbar.
      - Auth-Eingaben sind geschlossen und größenbegrenzt; JSON-Antwortschemas enthalten weder Passwort noch Recovery-Token oder Session-ID.
    evidence:
      - docs/implementation-evidence/spec-012-auth-contract.md
      - Auth-spezifischer OpenAPI-Contract-Test
      - pnpm contracts:openapi und pnpm check:generated
      - Review der Breaking-Change-Ausgabe gegen den letzten freigegebenen Vertrag

  - id: SPEC-013
    release: "0.1"
    status: implemented
    requirements: [PRD-API-002, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [GOV-001]
    outcome: Ein kanonisches Mapping der prüfungsspezifischen CheckSpec-Felder zwischen OpenAPI, Config Schema und Proto; gemeinsame Netzwerkoptionen folgen in SPEC-019 und Rust-Domänentypen in MON-011.
    acceptance:
      - Alle prüfungsspezifischen Check-Felder besitzen dokumentierte 1:1-Namen, Einheiten, Defaults und Grenzen.
      - Positive und negative Golden-Fixtures werden gegen alle drei Maschinenverträge geprüft.
    evidence:
      - docs/implementation-evidence/spec-013-check-spec-contract.md
      - pnpm contracts:validate
      - Cross-contract Golden-Test für alle sieben Check-Arten

  - id: SPEC-019
    release: "0.1"
    status: implemented
    requirements: [PRD-API-002, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [SPEC-013]
    outcome: Kanonisches Mapping gemeinsamer Proxy-, Resolver- und Adressfamilienoptionen für alle aktiven Netzwerkchecks.
    preflight:
      in_scope:
        - Normatives Mapping fuer Resolver und Adressfamilie auf HTTP, TCP, DNS, ICMP, TLS und Browser.
        - Proxy-URL und ausschliesslich referenzierte Basic-Zugangsdaten fuer HTTP, TCP, TLS und Browser.
        - Positive und negative Cross-Contract-Fixtures fuer OpenAPI, Config Schema und Proto.
        - Regenerierte OpenAPI- und Proto-Typen sowie Tracking und Implementation Evidence.
      out_of_scope:
        - Push-Heartbeat ohne ausgehende Netzwerkverbindung sowie Proxy-Unterstuetzung fuer DNS und ICMP.
        - Rust-Domaenentypen, Resolver- oder Proxy-Executor und Laufzeitvalidierung ausserhalb der Maschinenvertraege.
        - Migrationen, API-Endpunkte, UI und Veraenderungen an Egress-Policies.
      affected_artifacts:
        - specs/04-probes-and-checks.md
        - specs/contracts/openapi.yaml
        - specs/contracts/takt-config.schema.json
        - specs/contracts/probe.proto
        - specs/contracts/fixtures/check-spec-valid.json
        - specs/contracts/fixtures/check-spec-invalid.json
        - tools/check-spec-contract.test.mjs
        - web/src/generated/openapi.ts
        - crates/probe-protocol/src/generated/takt.probe.v1.rs
        - crates/probe-protocol/tests/generated_contract.rs
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/findings.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/spec-019-network-options-contract.md
      estimated_handwritten_lines: 560
      estimated_validation_minutes: 25
    acceptance:
      - OpenAPI, Config Schema und Proto besitzen dieselben Netzwerkfelder, SecretRef-Grenzen und Namen.
      - Positive und negative Golden-Fixtures prüfen Proxy-URLs, Proxy-Auth, Resolver und Adressfamilien.
    evidence:
      - Cross-contract Netzwerkoptionen-Golden-Test
      - pnpm contracts:validate und pnpm check:generated

  - id: SPEC-014
    release: "0.1"
    status: implemented
    requirements: []
    findings: [SPEC-005]
    depends_on: [GOV-001]
    outcome: Korrigierter Spezifikationsindex ohne Verweis auf ein fehlendes Artefakt.
    preflight:
      in_scope:
        - Entfernen des historisch unbelegten AGENTS.template.md-Eintrags aus dem Spezifikationsindex
        - Maschinenlesbarer Index-Link-Check mit positivem Literal-/Glob-Fall und negativem Missing-Path-Fall
        - CI-, Finding-, Status- und Evidence-Aktualisierung ohne Produktsemantikänderung
      out_of_scope:
        - Erfinden oder Hinzufügen einer nicht spezifizierten AGENTS.template.md
        - Änderungen an Requirements, Acceptance-Szenarien, OpenAPI, JSON Schema, Proto oder Runtime-Verhalten
        - Änderungen an Datenbanken, Migrationen, AuthZ, Audit, Secrets oder Observability
      affected_artifacts:
        - specs/README.md
        - tools/check-spec-index.mjs
        - tools/check-spec-index.test.mjs
        - package.json
        - .github/workflows/ci.yml
        - docs/implementation-tracking/
        - docs/implementation-evidence/spec-014-index-integrity.md
      estimated_handwritten_lines: 230
      estimated_validation_minutes: 15
    acceptance:
      - Jeder in specs/README.md gelistete Pfad existiert.
    evidence:
      - tools/check-spec-index.test.mjs
      - docs/implementation-evidence/spec-014-index-integrity.md

  - id: QA-001
    release: cross-release
    status: implemented
    requirements: [PRD-API-002, PRD-NFR-002, PRD-NFR-007, PRD-NFR-009]
    findings: [EVID-002]
    depends_on: [GOV-001]
    outcome: Maschinenlesbares Acceptance-Manifest mit ehrlichem Planned-/Runnable-Status und ausführbarem Release-Gate für jedes release-relevante Gherkin-Szenario.
    preflight:
      in_scope:
        - Maschinenlesbares Inventar aller 37 release-relevanten Gherkin-Szenarien mit stabilen IDs, Requirements und Testbindungen
        - Separates Struktur-Gate für Gherkin-Syntax und Acceptance-Ausführbarkeit einschließlich negativem Unbound-Szenario-Test
        - CI-, Tracking- und Evidence-Aktualisierung ohne vorgetäuschte Produktabnahme
      out_of_scope:
        - Implementierung der noch geplanten fachlichen Produktpfade hinter den 0.1- bis 0.3-Szenarien
        - Release-Verdict, unabhängige Clean-Checkout-Validierung und Schließen von EVID-002 vor grünen Verhaltensbindungen
        - Änderungen an OpenAPI, JSON Schema, Proto, Datenbanken, AuthZ, Audit, Secrets oder Observability
      affected_artifacts:
        - specs/acceptance/
        - tools/
        - package.json
        - .github/workflows/ci.yml
        - docs/implementation-tracking/
        - docs/implementation-evidence/qa-001-acceptance-bindings.md
      estimated_handwritten_lines: 680
      estimated_validation_minutes: 20
    acceptance:
      - Ein fehlendes Szenario-Binding oder ein Runnable-Binding ohne Testkommando lässt CI fehlschlagen.
      - Ein geplantes Binding lässt den zugehörigen Release-Ausführungsgate fehlschlagen und wird nie als Produktabnahme gezählt.
      - Syntaxvalidierung und Verhaltensausführung werden getrennt berichtet.
    evidence:
      - specs/acceptance/bindings.yaml
      - tools/check-acceptance-bindings.test.mjs
      - docs/implementation-evidence/qa-001-acceptance-bindings.md

  - id: IAM-010
    release: "0.1"
    status: implemented
    requirements: [PRD-API-001, PRD-API-002, PRD-API-005, PRD-IAM-001]
    findings: [SPEC-003]
    depends_on: [DATA-001, SPEC-012]
    outcome: Reviewte Verträge und Domänenregeln für Login, Logout, Session, Recovery und CSRF.
    preflight:
      in_scope:
        - Reine Domain-Regeln für standardmäßige und konfigurierbare Session-Laufzeiten, Aktivitätsverlängerung, absolute Ablaufgrenze und Security-Event-Wirkung.
        - Session-gebundene CSRF-Entscheidung für Browser-Schreibzugriffe einschließlich abgelaufener Sitzungen.
        - Stabile Problem-Codes und explizite Response-Verträge für ungültige, unautorisierte, CSRF-fehlerhafte und zu große Auth-Eingaben.
        - Fokussierte Domain- und OpenAPI-Contract-Tests sowie Tracking und Implementation Evidence.
      out_of_scope:
        - Session-, Recovery- und Token-Persistenz oder neue Migrationen; diese folgen in IAM-011 und IAM-014.
        - Laufzeit-Routen, Cookie-Erzeugung, Rate-Limit-Implementierung, Passwort-Recovery-Auslieferung und Audit-Orchestrierung; diese folgen ab IAM-012.
        - API-Token-Verträge und Scopes; diese folgen in SPEC-015 und IAM-013.
        - UI, OIDC, sichtbares Multi-Organization-RBAC und Änderungen an Login-/Recovery-Erfolgssichtbarkeit.
      affected_artifacts:
        - crates/domain/src/lib.rs
        - crates/domain/src/session.rs
        - crates/domain/tests/session_policy.rs
        - specs/contracts/openapi.yaml
        - tools/openapi-auth-contract.test.mjs
        - web/src/generated/openapi.ts
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/iam-010-auth-domain-contract.md
      estimated_handwritten_lines: 420
      estimated_validation_minutes: 25
    acceptance:
      - Cookie-, CSRF-, Rotations-, Ablauf- und generische Login-Fehlerregeln sind vertraglich testbar.
      - Ungültige oder zu große Eingaben liefern stabile Problem Codes.
    evidence:
      - OpenAPI-Contract-Tests für Auth-Operationen
      - Domain-Tests für Session-Laufzeiten und Rotation
      - docs/implementation-evidence/iam-010-auth-domain-contract.md

  - id: IAM-011
    release: "0.1"
    status: implemented
    requirements: [PRD-IAM-001, PRD-IAM-004, PRD-IAM-005, PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [IAM-010]
    outcome: Engine-paritäre Session-Anlage und -Suche mit ausschließlich gehashten Cookie-/CSRF-Werten und atomarem Create-Audit.
    preflight:
      in_scope:
        - Forward-only Migration 0002 für serverseitige Sessions mit UUIDv7, UTC-Mikrosekunden, Ablauf-/Revoke-Grenzen und ausschließlich gehashten Cookie-/CSRF-Werten.
        - "Gemeinsamer Session-Repository-Contract für PostgreSQL und SQLite: atomare Erstellung zusammen mit redigiertem Audit-Event sowie Token-/CSRF-Lookup."
        - Lookup ausschließlich über einen typisierten Token-Hash; Repository-Antworten und Debug-Ausgaben enthalten weder Hash noch Rohwert.
        - Positive, Constraint-, Redaction- und Create-Rollbacktests sowie Tracking und Implementation Evidence.
      out_of_scope:
        - Session-Refresh, optimistische Versionierung und atomarer Revoke mit Audit; dieser Lifecycle-Slice folgt separat in IAM-015.
        - Recovery-Token-Persistenz, Einmalverbrauch und Recovery-Audit; dieser Slice folgt separat in IAM-014.
        - HTTP-Login/-Logout/-Session-Routen, Cookie-Erzeugung, Hashableitung, CSRF-Vergleich und Rate Limits; diese folgen in IAM-012.
        - API-Token-Verträge und -Persistenz; diese folgen in SPEC-015 und IAM-013.
        - Rollen-/Permission-Engine, OIDC, UI und Änderungen am öffentlichen OpenAPI-Vertrag.
      affected_artifacts:
        - migrations/postgres/0002_sessions.sql
        - migrations/sqlite/0002_sessions.sql
        - crates/domain/src/lib.rs
        - crates/domain/src/session.rs
        - crates/application/src/lib.rs
        - crates/application/tests/credentials.rs
        - crates/persistence/src/repository.rs
        - crates/persistence/tests/common/mod.rs
        - crates/persistence/tests/postgres_contract.rs
        - crates/persistence/tests/sqlite_contract.rs
        - crates/server/tests/admin_bootstrap_cli.rs
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/iam-011-session-persistence.md
      estimated_handwritten_lines: 650
      estimated_validation_minutes: 25
    acceptance:
      - Derselbe Session-Repository-Contract läuft unverändert auf PostgreSQL und SQLite.
      - Cookie- und CSRF-Werte werden nur gehasht gespeichert und nie ausgelesen, zurückgegeben oder geloggt.
      - Session-Erstellung und ihr redigiertes Audit-Event werden vollständig committed oder zurückgerollt.
    evidence:
      - Gemeinsame Repository-Suite beider Engines
      - Migration-, Redaction- und Rollback-Tests

  - id: IAM-015
    release: "0.1"
    status: implemented
    requirements: [PRD-IAM-001, PRD-IAM-004, PRD-IAM-005, PRD-DATA-001, PRD-DATA-004, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [IAM-011]
    outcome: Engine-paritärer Session-Lifecycle mit Refresh, optimistischer Versionierung und atomarem Revoke-Audit.
    preflight:
      in_scope:
        - Typisierte Application-Port-Verträge für monotones Session-Refresh und versioniertes Revoke mit stabilem Audit-Aktionscode.
        - Derselbe PostgreSQL-/SQLite-Repository-Contract für erfolgreiche Refreshes, Stale-/Missing-/Expired-/Revoked-Ablehnung und deterministische Versionskonflikte.
        - Atomarer Revoke zusammen mit kohärentem redigiertem Audit-Event einschließlich Failpoint-Rollback und negativer Secret-Prüfung.
        - Fokussierte Tests, Tracking und Implementation Evidence ohne Änderung des öffentlichen API-Vertrags.
      out_of_scope:
        - Neue oder geänderte Migrationen; Session-Zeit-, Revoke- und Versionsspalten wurden bereits in IAM-011 angelegt.
        - Recovery-Token und Revoke aller Nutzersessions; diese folgen in IAM-014.
        - HTTP-Routen, Cookie-/Tokenrotation, Hashableitung, konstanter CSRF-Vergleich und Rate Limits; diese folgen in IAM-012.
        - API-Tokens, Permission Engine, OIDC, UI und neue Observability-Datenflüsse.
      affected_artifacts:
        - crates/application/src/lib.rs
        - crates/persistence/src/repository.rs
        - crates/persistence/tests/common/mod.rs
        - crates/persistence/tests/postgres_contract.rs
        - crates/persistence/tests/sqlite_contract.rs
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/iam-015-session-lifecycle.md
      estimated_handwritten_lines: 360
      estimated_validation_minutes: 25
    acceptance:
      - Derselbe Refresh-/Revoke-Repository-Contract läuft unverändert auf PostgreSQL und SQLite.
      - Abgelaufene oder widerrufene Sessions werden nicht verlängert; konkurrierende oder wiederholte Lifecycle-Schreibzugriffe sind deterministisch.
      - Session-Revoke und redigiertes Audit-Event committen oder rollen gemeinsam zurück.
    evidence:
      - Gemeinsame Repository-Suite beider Engines
      - Versionierungs-, Ablauf-, Redaction- und Rollback-Tests

  - id: IAM-014
    release: "0.1"
    status: implemented
    requirements: [PRD-IAM-001, PRD-IAM-004, PRD-IAM-005, PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [IAM-015]
    outcome: Engine-paritäre Recovery-Token-Persistenz mit Hashspeicherung, Einmalverbrauch und atomarer Auditwirkung.
    preflight:
      in_scope:
        - Forward-only Migration 0003 für UUIDv7-Recovery-Tokens mit ausschließlich gehashtem Tokenwert, UTC-Ablauf-/Verbrauchszeit und monotoner Version.
        - Typisierter gemeinsamer PostgreSQL-/SQLite-Repository-Vertrag für atomare Ausgabe und einmaligen, ablaufgeschützten Verbrauch.
        - Atomare Passwort-Hash-Ersetzung, Revoke aller aktiven Nutzersessions und redigiertes Recovery-Audit bei erfolgreichem Verbrauch.
        - Konkurrenz-, Replay-, Ablauf-, Constraint-, Redaction- und Failpoint-Tests sowie Tracking, Persistenzdokumentation und Implementation Evidence.
      out_of_scope:
        - Roh-Token-Erzeugung, Recovery-Auslieferung, lokaler Admin-CLI-Fallback und HTTP-Recovery-Orchestrierung; diese Laufzeitgrenzen folgen in IAM-012.
        - Login-, Logout- und Session-HTTP-Routen, Cookie-/CSRF-Verifikation und Rate Limits; diese folgen in IAM-012.
        - API-Tokens, Scopes, Permission Engine, OIDC, UI und neue externe Daten- oder Observability-Flüsse.
        - Vollständige Audit-Hashverkettung und Export; diese bleiben IAM-033 zugeordnet.
      affected_artifacts:
        - migrations/postgres/0003_recovery_tokens.sql
        - migrations/sqlite/0003_recovery_tokens.sql
        - crates/domain/src/lib.rs
        - crates/application/src/lib.rs
        - crates/persistence/src/repository.rs
        - crates/persistence/tests/common/mod.rs
        - crates/persistence/tests/postgres_contract.rs
        - crates/persistence/tests/sqlite_contract.rs
        - crates/server/tests/admin_bootstrap_cli.rs
        - docs/persistence.md
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-tracking/current-status.md
        - docs/implementation-evidence/iam-014-recovery-persistence.md
      estimated_handwritten_lines: 780
      estimated_validation_minutes: 25
    acceptance:
      - Derselbe Recovery-Repository-Contract läuft unverändert auf PostgreSQL und SQLite.
      - Tokenwerte werden nur gehasht gespeichert; Ablauf, erfolgreicher Einmalverbrauch und Replay-Ablehnung sind deterministisch getestet.
