schema_version: 1
packages:
  - id: GOV-001
    release: cross-release
    status: implemented
    requirements: [PRD-API-002]
    findings: []
    depends_on: []
    outcome: Versionierte Requirement-, Work-Package- und Findings-Register mit automatischem Konsistenz-Gate.
    acceptance:
      - Alle 57 kanonischen PRD-IDs kommen im Ledger genau einmal vor.
      - Unbekannte IDs, fehlende Pakete, unbekannte Abhängigkeiten und Paketzyklen lassen den Gate-Test fehlschlagen.
    evidence:
      - node --test tools/check-implementation-tracking.test.mjs
      - pnpm check:tracking

  - id: GOV-003
    release: cross-release
    status: implemented
    requirements: []
    findings: []
    depends_on: [GOV-001]
    outcome: Automatischer Größen- und Validierungs-Preflight vor Beginn jedes neuen Arbeitspakets.
    preflight:
      in_scope:
        - Tracking-Metadaten und Validator für Scope, Ausschlüsse, Artefakte, Zeilen- und Validierungsbudget.
        - Warnung ab 600 geschätzten handgeschriebenen Zeilen und harte Grenzen bei 800 Zeilen beziehungsweise 30 Minuten.
      out_of_scope:
        - Rückwirkende Schätzungen für bereits abgeschlossene oder nur geplante Pakete.
        - Automatische Messung tatsächlicher Diff-Zeilen oder Laufzeiten.
      affected_artifacts:
        - docs/implementation-tracking/README.md
        - docs/implementation-tracking/current-status.md
        - docs/implementation-tracking/findings.yaml
        - docs/implementation-tracking/requirements.yaml
        - docs/implementation-tracking/work-packages.yaml
        - docs/implementation-evidence/gov-003-package-preflight.md
        - tools/check-implementation-tracking.mjs
        - tools/check-implementation-tracking.test.mjs
      estimated_handwritten_lines: 280
      estimated_validation_minutes: 10
    acceptance:
      - Ein in_progress-Paket ohne vollständigen Preflight lässt pnpm check:tracking fehlschlagen.
      - Schätzungen über 800 Zeilen oder 30 Minuten schlagen fehl; ab 600 Zeilen wird ohne Gate-Fehler gewarnt.
    evidence:
      - docs/implementation-evidence/gov-003-package-preflight.md
      - node --test tools/check-implementation-tracking.test.mjs
      - pnpm check:tracking

  - id: GOV-002
    release: cross-release
    status: planned
    requirements: [PRD-API-002]
    findings: [SEC-001]
    depends_on: [GOV-001]
    outcome: Gepatchter YAML-Parser im OpenAPI-Codegen-Tooling ohne High-Severity-Advisory.
    acceptance:
      - Der transitive `js-yaml`-Pfad verwendet mindestens Version 4.3.0.
      - Contract-, Generated-Drift- und vollständiger Node-Audit-Gate bleiben grün.
    evidence:
      - pnpm audit --audit-level high
      - pnpm contracts:validate und pnpm check:generated

  - id: CORE-001
    release: "0.1"
    status: implemented
    requirements: [PRD-API-002, PRD-MON-007, PRD-NFR-001, PRD-NFR-003, PRD-NFR-008, PRD-NFR-010]
    findings: [EVID-001]
    depends_on: []
    outcome: Gepinnter Monorepo-Bootstrap mit Health/Readiness, eingebettetem Web-Build und generierten OpenAPI-/Proto-Typen.
    acceptance:
      - Health-Endpunkte antworten über einen echten TCP-Listener vertragstreu und redigiert.
      - Contract-, Architektur- und Generated-Drift-Gates laufen reproduzierbar.
    evidence:
      - docs/implementation-evidence/bootstrap.md
      - Aktueller unabhängiger Clean-Checkout-Verdict ist wegen EVID-001 nachzuliefern.

  - id: DATA-001
    release: "0.1"
    status: implemented
    requirements: [PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-IAM-001, PRD-IAM-003, PRD-IAM-004, PRD-IAM-005, PRD-NFR-001, PRD-NFR-002, PRD-NFR-005, PRD-NFR-007, PRD-NFR-008, PRD-NFR-010]
    findings: [SPEC-001, EVID-001]
    depends_on: [CORE-001]
    outcome: Äquivalente PostgreSQL-/SQLite-Identitätspersistenz, Default-Kontext, lokaler Owner-Bootstrap und append-only Bootstrap-Audit.
    acceptance:
      - Dieselbe Repository-Suite läuft auf SQLite und echtem PostgreSQL 16.
      - Bootstrap ist atomar, idempotent, nebenläufig sicher und gibt keine Zugangsdaten aus.
    evidence:
      - docs/implementation-evidence/persistence-admin-bootstrap.md
      - Aktueller unabhängiger Clean-Checkout-Verdict ist wegen EVID-001 nachzuliefern.

  - id: SPEC-010
    release: "0.1"
    status: implemented
    requirements: [PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-IAM-001, PRD-IAM-003, PRD-NFR-002, PRD-NFR-005, PRD-NFR-007]
    findings: [SPEC-001]
    depends_on: [GOV-001]
    outcome: Kanonische, durchgängig verwendete Requirement-IDs für Daten- und Migrationsverhalten.
    acceptance:
      - SPEC-001 ist durch einen reviewten Spec-Change entschieden.
      - Keine nicht kanonische PRD-ID bleibt außerhalb historischer Evidence übrig.
    evidence:
      - docs/implementation-evidence/spec-010-data-requirements.md
      - pnpm check:tracking ohne unknown-requirement-Ausnahmen
      - Review-Diff von Kapitel 00, Kapitel 10, Migrationen und betroffenen Tests

  - id: SPEC-011
    release: "0.3"
    status: planned
    requirements: []
    findings: [SPEC-002]
    depends_on: [GOV-001]
    outcome: Normative Requirement-ID und Acceptance-Tag für Monitorabhängigkeiten.
    acceptance:
      - Kapitel 00, Kapitel 10 und v0.3.feature referenzieren dieselbe neue ID.
      - DAG-, Sichtbarkeits- und Notification-Suppression-Semantik bleiben unverändert beschrieben.
    evidence:
      - pnpm contracts:gherkin
      - pnpm check:tracking

  - id: SPEC-012
    release: "0.1"
    status: implemented
    requirements: [PRD-API-001, PRD-API-002, PRD-API-005, PRD-IAM-001, PRD-IAM-005]
    findings: [SPEC-003]
    depends_on: [GOV-001]
    outcome: Reviewter OpenAPI-Vertrag für Browser-Login, Logout, Session, Recovery und CSRF.
    acceptance:
      - Cookie-, CSRF-, Rotations-, Ablauf-, Rate-Limit- und generische Login-/Recovery-Fehlerregeln sind vertraglich testbar.
      - Auth-Eingaben sind geschlossen und größenbegrenzt; JSON-Antwortschemas enthalten weder Passwort noch Recovery-Token oder Session-ID.
    evidence:
      - docs/implementation-evidence/spec-012-auth-contract.md
      - Auth-spezifischer OpenAPI-Contract-Test
      - pnpm contracts:openapi und pnpm check:generated
      - Review der Breaking-Change-Ausgabe gegen den letzten freigegebenen Vertrag

  - id: SPEC-013
    release: "0.1"
    status: implemented
    requirements: [PRD-API-002, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [GOV-001]
    outcome: Ein kanonisches Mapping der prüfungsspezifischen CheckSpec-Felder zwischen OpenAPI, Config Schema und Proto; gemeinsame Netzwerkoptionen folgen in SPEC-019 und Rust-Domänentypen in MON-011.
    acceptance:
      - Alle prüfungsspezifischen Check-Felder besitzen dokumentierte 1:1-Namen, Einheiten, Defaults und Grenzen.
      - Positive und negative Golden-Fixtures werden gegen alle drei Maschinenverträge geprüft.
    evidence:
      - docs/implementation-evidence/spec-013-check-spec-contract.md
      - pnpm contracts:validate
      - Cross-contract Golden-Test für alle sieben Check-Arten

  - id: SPEC-019
    release: "0.1"
    status: planned
    requirements: [PRD-API-002, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [SPEC-013]
    outcome: Kanonisches Mapping gemeinsamer Proxy-, Resolver- und Adressfamilienoptionen für alle aktiven Netzwerkchecks.
    acceptance:
      - OpenAPI, Config Schema und Proto besitzen dieselben Netzwerkfelder, SecretRef-Grenzen und Namen.
      - Positive und negative Golden-Fixtures prüfen Proxy-URLs, Proxy-Auth, Resolver und Adressfamilien.
    evidence:
      - Cross-contract Netzwerkoptionen-Golden-Test
      - pnpm contracts:validate und pnpm check:generated

  - id: SPEC-014
    release: "0.1"
    status: planned
    requirements: []
    findings: [SPEC-005]
    depends_on: [GOV-001]
    outcome: Korrigierter Spezifikationsindex ohne Verweis auf ein fehlendes Artefakt.
    acceptance:
      - Jeder in specs/README.md gelistete Pfad existiert.
    evidence:
      - Index-Link-Check

  - id: QA-001
    release: cross-release
    status: planned
    requirements: [PRD-API-002, PRD-NFR-002, PRD-NFR-007, PRD-NFR-009]
    findings: [EVID-002]
    depends_on: [GOV-001]
    outcome: Ausführbare Zuordnung jedes release-relevanten Gherkin-Szenarios zu automatisierten Tests.
    acceptance:
      - Ein Release-Szenario ohne ausführbaren Test lässt CI fehlschlagen.
      - Syntaxvalidierung und Verhaltensausführung werden getrennt berichtet.
    evidence:
      - Szenario-zu-Test-Manifest oder Cucumber-Ausführungsbericht
      - Negativtest für ein absichtlich ungebundenes Szenario

  - id: IAM-010
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-002, PRD-API-005, PRD-IAM-001]
    findings: [SPEC-003]
    depends_on: [DATA-001, SPEC-012]
    outcome: Reviewte Verträge und Domänenregeln für Login, Logout, Session, Recovery und CSRF.
    acceptance:
      - Cookie-, CSRF-, Rotations-, Ablauf- und generische Login-Fehlerregeln sind vertraglich testbar.
      - Ungültige oder zu große Eingaben liefern stabile Problem Codes.
    evidence:
      - OpenAPI-Contract-Tests für Auth-Operationen
      - Domain-Tests für Session-Laufzeiten und Rotation

  - id: IAM-011
    release: "0.1"
    status: planned
    requirements: [PRD-IAM-001, PRD-IAM-004, PRD-IAM-005, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [IAM-010]
    outcome: Engine-paritäre Session-/Recovery-Persistenz und atomare Auditwirkung.
    acceptance:
      - Session- und Recovery-Repository-Contract läuft unverändert auf PostgreSQL und SQLite.
      - Tokenwerte werden nur gehasht gespeichert und nie ausgelesen oder geloggt.
    evidence:
      - Gemeinsame Repository-Suite beider Engines
      - Migration-, Redaction- und Rollback-Tests

  - id: IAM-012
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-003, PRD-API-005, PRD-IAM-001, PRD-IAM-004, PRD-IAM-005]
    findings: []
    depends_on: [IAM-011]
    outcome: Login-/Logout-/Session-HTTP-Pfad mit sicherem Cookie, CSRF und Rate Limit.
    acceptance:
      - Login rotiert die Session und verrät nicht, ob ein Nutzer existiert.
      - Schreibzugriffe ohne gültiges CSRF oder mit abgelaufener Session ändern keine Daten.
    evidence:
      - Laufzeitantworten gegen OpenAPI validiert
      - HTTP-Integrationstests für CSRF, Fixation, Ablauf und Rate Limit

  - id: IAM-013
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-003, PRD-API-004, PRD-API-005, PRD-IAM-001, PRD-IAM-004, PRD-IAM-005]
    findings: [SPEC-003]
    depends_on: [IAM-012, SPEC-015]
    outcome: API-Token-CRUD, einmalige Ausgabe, Hashspeicherung und serverseitige Scope-Prüfung.
    acceptance:
      - Ein monitors:read-Token kann lesen, aber weder erstellen noch Rechte ableiten.
      - Tokenwert erscheint nur bei Erzeugung und in keinem Log, Audit oder Listen-Response.
    evidence:
      - v0.1 Token-Scope-Acceptance
      - Negative Permission- und Secret-Scan-Tests

  - id: SPEC-015
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-002, PRD-API-003, PRD-API-004, PRD-API-005, PRD-IAM-001, PRD-IAM-004, PRD-IAM-005]
    findings: [SPEC-003]
    depends_on: [IAM-012]
    outcome: Reviewter OpenAPI-Vertrag für API-Token-CRUD, einmalige Wertausgabe, Scopes und Listenfilter.
    acceptance:
      - Tokenwerte erscheinen nur in der Create-Antwort und nie in Listen-, Get-, Audit- oder Fehler-Schemas.
      - CRUD besitzt Idempotenz, ETag, Pagination sowie Auth-, Permission-, Erfolgs- und Problem-Responses.
    evidence:
      - API-Token-OpenAPI-Contract-Test
      - pnpm contracts:openapi und pnpm check:generated

  - id: MON-010
    release: "0.1"
    status: planned
    requirements: [PRD-API-002, PRD-MON-001, PRD-MON-002, PRD-MON-003, PRD-MON-004, PRD-MON-006]
    findings: [SPEC-004]
    depends_on: [SPEC-019]
    outcome: Abgestimmter Monitor-/Check-Vertrag einschließlich Revision, Zeitplan und Grenzen.
    acceptance:
      - OpenAPI und Config Schema drücken dieselben gültigen 0.1-Monitorwerte aus.
      - Unbekannte Felder und ungültige Kombinationen werden an jeder Eingabegrenze abgelehnt.
    evidence:
      - Cross-contract Monitor-Fixtures
      - Generated-code-Drift-Check

  - id: MON-011
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-001, PRD-ALT-002, PRD-ALT-006, PRD-MON-002, PRD-MON-003, PRD-MON-004, PRD-MON-006, PRD-NFR-010]
    findings: []
    depends_on: [MON-010]
    outcome: Frameworkfreie Domain-Typen für Monitor, CheckSpec, Revision, Observation und Evaluation.
    acceptance:
      - IDs, Slugs, Intervalle, Timeouts, Thresholds und Checkvarianten besitzen positive/negative Unit-Tests.
      - Uhr und ID-Quelle sind injizierbar; Domain importiert kein I/O-Framework.
    evidence:
      - Domain Unit-/Property-Tests mit Requirement-IDs
      - pnpm check:architecture

  - id: DATA-010
    release: "0.1"
    status: planned
    requirements: [PRD-DATA-001, PRD-DATA-002, PRD-DATA-004, PRD-MON-001, PRD-MON-003, PRD-MON-006, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [DATA-001, MON-011]
    outcome: Monitor- und unveränderliche Revisionspersistenz mit Engine-Parität und optimistischer Versionierung.
    acceptance:
      - Slug-Eindeutigkeit, Revisionserzeugung, ETag-Konflikt und Mandantenschlüssel laufen auf beiden Engines.
      - Migrationen sind forward-only und alte Jobs referenzieren stabile Revisionen.
    evidence:
      - Gemeinsame PostgreSQL-/SQLite-Repository-Suite
      - Migrations- und Rollback-Failpoint-Test

  - id: API-010
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-003, PRD-API-004, PRD-API-005, PRD-IAM-004, PRD-IAM-005, PRD-MON-001, PRD-MON-003, PRD-MON-004, PRD-MON-006]
    findings: []
    depends_on: [DATA-010, IAM-013]
    outcome: Monitor-CRUD über die öffentliche API mit Idempotenz, ETag und stabiler Cursor-Pagination.
    acceptance:
      - Create/replay/reused-key und konkurrierendes If-Match erfüllen v0.1.feature.
      - Auth-, Permission-, Erfolgs- und Problem-Responses werden gegen OpenAPI geprüft.
    evidence:
      - API-Contract-Suite auf PostgreSQL und SQLite
      - Audit- und Negative-Permission-Tests

  - id: WEB-010
    release: "0.1"
    status: planned
    requirements: [PRD-MON-001, PRD-NFR-006, PRD-NFR-009]
    findings: []
    depends_on: [API-010]
    outcome: Monitorliste und Create/Edit-Formular als ausschließliche Clients der öffentlichen API.
    acceptance:
      - Loading, Empty, Error und Success sind getestet.
      - Tastatur, sichtbarer Fokus, Accessible Names und URL-stabile Filter sind abgedeckt.
    evidence:
      - Vitest-Komponententests
      - Playwright- und axe-Bericht in Deutsch und Englisch

  - id: CHECK-010
    release: "0.1"
    status: planned
    requirements: [PRD-MON-004, PRD-MON-005, PRD-NFR-010]
    findings: []
    depends_on: [DATA-010]
    outcome: Deterministischer Scheduler, CheckJobs und Leases ohne kumulativen Drift oder parallele Überschneidung.
    acceptance:
      - Jitter, Pause, verspäteter Start, superseded Revision und Lease-Rennen sind kontrolliert getestet.
      - Überlast oder interner Fehler erzeugt keinen Target-Ausfall.
    evidence:
      - Scheduler Property-/Concurrency-Tests mit injizierter Uhr
      - Gemeinsame Lease-Repository-Suite

  - id: CHECK-011
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002, PRD-MON-005]
    findings: [SPEC-004]
    depends_on: [MON-011]
    outcome: HTTP(S)-Executor mit getrennten Budgets, sicheren Redirects, SSRF-Regeln und redigierter Observation.
    acceptance:
      - Kontrollierte Ziele decken DNS, TLS, Redirect, Timeout, Bodylimit und Assertion ab.
      - Infrastruktur-/Capability-Fehler werden nie TARGET_FAILURE und Secrets erscheinen in keiner Observation.
    evidence:
      - Lokale Zielserver-Integrationstests ohne öffentliches Internet
      - SSRF- und Secret-Redaction-Testkorpus

  - id: ALERT-010
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-001, PRD-ALT-002, PRD-ALT-006, PRD-NFR-010]
    findings: []
    depends_on: [MON-011]
    outcome: Deterministischer Evaluator und Zustandsautomat für Thresholds, Recovery und UNKNOWN.
    acceptance:
      - Drei Target-Ausfälle und zwei Erfolge erzeugen genau die spezifizierten Transitionen.
      - Beliebige Sequenzen interner/Probe-Fehler erzeugen allein niemals DOWN.
    evidence:
      - Unit-, Property- und Mutationstests des Zustandsautomaten
      - v0.1 Threshold-/Internal-Error-Szenarien

  - id: DATA-011
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-003, PRD-ALT-004, PRD-ALT-006, PRD-NFR-002, PRD-NFR-005]
    findings: []
    depends_on: [ALERT-010, DATA-010]
    outcome: Atomare Speicherung von Observation, Evaluation, Transition, Uptime-Bucket und Outbox-Event.
    acceptance:
      - Failpoints beweisen vollständigen Commit oder vollständigen Rollback auf beiden Engines.
      - Doppelte Observationen haben höchstens eine Zustandswirkung.
    evidence:
      - Gemeinsame Transaktions-/Idempotenz-Suite
      - DB-Ausfall-Chaostest

  - id: CHECK-012
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-004, PRD-API-005, PRD-MON-005]
    findings: [SPEC-003]
    depends_on: [API-010, CHECK-010, CHECK-011, DATA-011, SPEC-016]
    outcome: Vollständiger HTTP-Pfad schedule/run → execute → evaluate → store → observation/transition/uptime API.
    acceptance:
      - Ein sofortiger Check ist über Operation und Check-ID bis zum Ergebnis verfolgbar.
      - Ein DB-Ausfall bleibt sichtbar und erzeugt keine DOWN-Transition oder Notification.
    evidence:
      - End-to-End-Integration auf beiden Datenbanken
      - v0.1 HTTP- und DB-Ausfall-Szenarien

  - id: SPEC-016
    release: "0.1"
    status: planned
    requirements: [PRD-API-001, PRD-API-002, PRD-API-003, PRD-API-004, PRD-API-005, PRD-MON-001, PRD-MON-005, PRD-NFR-008]
    findings: [SPEC-003]
    depends_on: [API-010, CHECK-010, CHECK-011, DATA-011]
    outcome: Reviewte OpenAPI-Verträge für Pause/Resume, Transitionen, Operationsabruf und authentifizierte SSE.
    acceptance:
      - Sofortchecks sind über Operation und Check-ID bis zum Ergebnis verfolgbar; Pause/Resume sind idempotent und ETag-geschützt.
      - SSE verlangt Authentifizierung, unterstützt Last-Event-ID und dokumentiert Gap-/Problemverhalten ohne Secrets.
    evidence:
      - Monitor-Operations-/SSE-OpenAPI-Contract-Test
      - pnpm contracts:openapi und pnpm check:generated

  - id: WEB-011
    release: "0.1"
    status: planned
    requirements: [PRD-MON-005, PRD-NFR-009]
    findings: [SPEC-003]
    depends_on: [CHECK-012, WEB-010]
    outcome: Monitor-Detail, Timeline, zeitgewichtete Uptime und SSE-Live-Aktualisierung.
    acceptance:
      - UI erklärt Zustand und UNKNOWN-Ursache und stellt UNKNOWN niemals grün dar.
      - SSE-Lücke führt zu REST-Refetch; Scroll-/Filterzustand bleibt stabil.
    evidence:
      - Playwright Run/Failure/Recovery-Flow
      - Accessibility- und SSE-Reconnect-Tests

  - id: CHECK-013
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [CHECK-012]
    outcome: Typisierter TCP-Check mit 4-KiB-Sende-/Antwortgrenzen.
    acceptance: [Erfolg, Prefix-Mismatch, Timeout, Cancel und Redaction laufen gegen kontrollierte TCP-Ziele.]
    evidence: [TCP-Integrationstests und Check-Outline-Acceptance]

  - id: CHECK-014
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [CHECK-012]
    outcome: Typisierter DNS-Check für alle normativen Record-Typen und Resolvermodi.
    acceptance: [RCODE, normalisierte Werte, Timeout, DoT/UDP/TCP und Redaction laufen gegen kontrollierte DNS-Ziele.]
    evidence: [DNS-Integrationstests und Check-Outline-Acceptance]

  - id: CHECK-015
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [CHECK-012]
    outcome: Typisierter ICMP-Check mit expliziter Capability-Fehlerklassifikation.
    acceptance: [Fehlende OS-Capability ergibt UNKNOWN/capability_missing und niemals DOWN.]
    evidence: [Privilegierte und unprivilegierte Container-Integrationstests]

  - id: CHECK-016
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [CHECK-012]
    outcome: Typisierter TLS-Zertifikatscheck für Kette, Hostname und Ablaufgrenzen.
    acceptance: [Kontrollierte Zertifikate beweisen UP, DEGRADED, DOWN und Infrastrukturfehlerklassifikation.]
    evidence: [Lokale TLS-Fixtures und Check-Outline-Acceptance]

  - id: CHECK-017
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-006, PRD-MON-002]
    findings: [SPEC-004]
    depends_on: [CHECK-012]
    outcome: Push-Heartbeat mit starkem rotierbarem Token, Grace Window und begrenzter Payload.
    acceptance: [Token erscheint einmal, Rotation überlappt höchstens 24 Stunden und fehlender Push wird fachlich korrekt ausgewertet.]
    evidence: [Push-API-, Rotation-, Rate-Limit- und Secret-Leak-Tests]

  - id: NOTIFY-010
    release: "0.1"
    status: planned
    requirements: [PRD-ALT-003, PRD-ALT-004, PRD-API-001, PRD-API-003, PRD-API-004, PRD-API-005, PRD-IAM-004, PRD-IAM-005, PRD-NOT-001, PRD-NOT-002, PRD-NOT-003, PRD-NOT-004]
    findings: [SPEC-003]
    depends_on: [DATA-011, IAM-013, SPEC-017]
    outcome: Verschlüsselte Notification-Channel-Ressource, Webhook-Adapter und unabhängiger Outbox-Worker.
    acceptance:
      - Channel-Test erzeugt keinen künstlichen Monitor-Ausfall.
      - Zwei 500er und ein 204 liefern dieselbe Event-ID, steigenden Backoff und erfolgreichen dritten Versuch.
