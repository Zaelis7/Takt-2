schema_version: 1
findings:
  - id: SPEC-001
    status: resolved
    severity: high
    kind: error
    decision: spec_change
    summary: PRD-DATA-001, PRD-DATA-002 and PRD-DATA-004 are used as requirement IDs but do not exist in the canonical product requirements or traceability table.
    locations:
      - specs/00-product-requirements.md
      - specs/10-traceability.md
      - migrations/postgres/0001_persistent_identity.sql
      - migrations/sqlite/0001_persistent_identity.sql
      - docs/implementation-evidence/persistence-admin-bootstrap.md
    affects:
      - PRD-DATA-001
      - PRD-DATA-002
      - PRD-DATA-004
      - PRD-IAM-001
      - PRD-IAM-003
      - PRD-NFR-002
      - PRD-NFR-005
      - PRD-NFR-007
    resolution: Canonical definitions for the three already-used stable IDs were added to chapter 00 by lifting existing engine-parity, migration-lifecycle and persistent-identity rules without changing their semantics; chapter 10 and v0.1 acceptance now trace them, and the temporary unknown-ID exceptions were removed. No additional DATA identifier was invented.

  - id: SPEC-002
    status: open
    severity: high
    kind: gap
    decision: spec_change
    summary: Monitor dependencies are required by the 0.3 roadmap and have an acceptance scenario, but no Requirement ID or traceability entry.
    locations:
      - specs/08-roadmap.md
      - specs/acceptance/v0.3.feature
      - specs/10-traceability.md
    affects: []
    resolution: Add a canonical requirement, tag the Gherkin scenario and place it in the release traceability table before implementation begins.

  - id: SPEC-003
    status: open
    severity: high
    kind: gap
    decision: spec_change
    summary: Browser auth/recovery and API-token management are now contracted, but the normative OpenAPI still omits required 0.1 operations for monitor transitions and pause/resume, operation lookup, notification-channel management, status-page management and authenticated SSE.
    locations:
      - specs/contracts/openapi.yaml
      - specs/03-api-and-automation.md
      - specs/08-roadmap.md
      - specs/acceptance/v0.1.feature
    affects:
      - PRD-API-001
      - PRD-IAM-001
      - PRD-MON-001
      - PRD-MON-005
      - PRD-NOT-001
      - PRD-NOT-002
      - PRD-NOT-003
      - PRD-NOT-004
      - PRD-STA-001
    resolution: The oversized package was split into SPEC-012 and dependency-gated SPEC-015 through SPEC-018. SPEC-012 defines browser auth/session/recovery and SPEC-015 defines API-token CRUD, one-time output, scopes, filters and concurrency boundaries. The finding remains open until the monitor/SSE, notification and status-page contract packages are implemented. Do not infer response or error semantics from prose alone.

  - id: SPEC-006
    status: resolved
    severity: high
    kind: conflict
    decision: spec_change
    summary: API-token Create requires a token-bearing 201 response and 24-hour idempotency, while the prose says the token is visible only once and does not define replay response or safe persistence semantics.
    locations:
      - specs/contracts/openapi.yaml
      - specs/01-architecture.md
      - specs/03-api-and-automation.md
      - tools/openapi-token-contract.test.mjs
    affects:
      - PRD-API-002
      - PRD-API-003
      - PRD-IAM-001
      - PRD-IAM-005
    resolution: SPEC-020 defines that an identical replay returns the same token-bearing 201 status, relevant headers and body for 24 hours, bound to actor, method, path and request hash. A different hash returns 409 idempotency_key_reused without business or audit effect. The replay payload must use authenticated encryption and remain absent from ordinary reads, audit, Problems, logs and telemetry. IAM-024 implements the persistence and encryption boundary; IAM-025 and IAM-013 provide application and HTTP runtime behavior.

  - id: SPEC-007
    status: resolved
    severity: high
    kind: conflict
    decision: spec_change
    summary: Chapter 03 requires 400 invalid_cursor for an invalid or expired list cursor, while the API-token list operation references the InvalidRequestProblem schema whose code is fixed to invalid_request.
    locations:
      - specs/03-api-and-automation.md
      - specs/contracts/openapi.yaml
      - tools/openapi-token-contract.test.mjs
    affects:
      - PRD-API-002
      - PRD-API-004
      - PRD-API-005
    resolution: SPEC-021 adds the stable InvalidCursorProblem response/schema to OpenAPI, binds the API-token list 400 response to it, regenerates the TypeScript contract and prevents regression with a focused PRD-API-004/005 test. IAM-035 can now implement the exact runtime serialization without interpreting the conflict.

  - id: SPEC-004
    status: resolved
    severity: high
    kind: conflict
    decision: spec_change
    summary: OpenAPI, the declarative JSON Schema, Proto and chapter 04 expose different option sets and naming for the same check types, most visibly HTTP headers, body, auth, assertions and response limits.
    locations:
      - specs/contracts/openapi.yaml
      - specs/contracts/takt-config.schema.json
      - specs/contracts/probe.proto
      - specs/04-probes-and-checks.md
    affects:
      - PRD-API-002
      - PRD-MON-002
    resolution: SPEC-013 defines and tests the normative per-kind mapping across all seven variants. SPEC-019 adds the shared proxy, resolver and address-family schemas, exact applicability, SecretRef-to-ephemeral-key boundary, positive and negative golden fixtures and generated-type drift checks. Framework-free Rust domain types remain explicitly scoped to MON-011.

  - id: SPEC-005
    status: resolved
    severity: medium
    kind: error
    decision: spec_change
    summary: The specification index lists AGENTS.template.md, but that file is not present in the specification package.
    locations:
      - specs/README.md
    affects: []
    resolution: SPEC-014 removed the AGENTS.template.md index row because repository history confirms the file never existed and chapter 09 requires the real root AGENTS.md instead. A CI-enforced index check now validates every literal and glob path listed in the document table and rejects missing or escaping paths.

  - id: EVID-001
    status: resolved
    severity: high
    kind: evidence_gap
    decision: implementation
    summary: Existing evidence is not a current independent verdict; bootstrap evidence records a failed validator result and persistence evidence targets an older base while explicitly leaving post-remediation validation pending.
    locations:
      - docs/implementation-evidence/bootstrap.md
      - docs/implementation-evidence/persistence-admin-bootstrap.md
      - docs/implementation-evidence/evid-001-independent-head-validation.md
    affects:
      - PRD-API-002
      - PRD-IAM-001
      - PRD-IAM-003
      - PRD-IAM-005
      - PRD-NFR-001
      - PRD-NFR-002
      - PRD-NFR-008
      - PRD-NFR-010
    resolution: Commit 4ef411a4718d21fc4f364494dc3810f716215e98 passed the complete current repository gate set in a clean detached checkout against real PostgreSQL 16.9 and SQLite. The commit-bound verdict is recorded in evid-001-independent-head-validation.md, while the historical failed bootstrap verdict and older pending persistence verdict remain intact.

  - id: EVID-002
    status: open
    severity: high
    kind: evidence_gap
    decision: implementation
    summary: All 37 Gherkin scenarios now have exact machine-checked inventory and implementation-package mappings, but every binding remains planned with no behavior-test command, so green contract or binding validation is not product acceptance.
    locations:
      - tools/validate-gherkin.mjs
      - tools/check-acceptance-bindings.mjs
      - tools/check-acceptance-bindings.test.mjs
      - specs/acceptance/bindings.yaml
      - specs/acceptance/v0.1.feature
      - specs/acceptance/v0.2.feature
      - specs/acceptance/v0.3.feature
      - specs/07-quality-acceptance.md
    affects:
      - PRD-API-002
      - PRD-NFR-002
      - PRD-NFR-007
      - PRD-NFR-009
    resolution: QA-001 added the complete manifest, PRD-tag drift checks and a release runner that fails on planned or commandless bindings. Keep this finding open until feature packages promote their scenarios with real test commands and QA-010/020/030 execute the applicable release sets without skips.

  - id: DEC-001
    status: open
    severity: high
    kind: ambiguity
    decision: owner_decision
    summary: License model, Takt name/package availability and official security/signing channels still require owner confirmation before a public 0.1 release.
    locations:
      - specs/README.md
      - specs/06-security-operations.md
      - specs/08-roadmap.md
    affects:
      - PRD-NFR-003
    resolution: Record owner decisions in versioned ADRs or specification decisions before public packaging and signing work is approved.

  - id: SEC-001
    status: resolved
    severity: high
    kind: gap
    decision: implementation
    summary: The OpenAPI code-generation toolchain resolves js-yaml 4.2.0 through openapi-typescript and is affected by GHSA-52cp-r559-cp3m, causing the mandatory full Node audit gate to fail.
    locations:
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - tools/node-supply-chain.test.mjs
      - docs/implementation-evidence/gov-002-node-supply-chain.md
    affects:
      - PRD-API-002
    resolution: Resolved by a pnpm 11 workspace override to js-yaml 4.3.0, a lockfile regression test that rejects every older js-yaml package, and green contract, generated-drift, license and full Node audit gates without an audit exception.

  - id: SEC-002
    status: resolved
    severity: high
    kind: gap
    decision: implementation
    summary: The existing Ajv dependency graph resolved fast-uri 3.1.3, which is affected by GHSA-v2hh-gcrm-f6hx and caused the mandatory full Node audit gate to fail during IAM-027 validation.
    locations:
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - tools/node-supply-chain.test.mjs
      - docs/implementation-evidence/iam-027-api-token-idempotency-foundation.md
    affects:
      - PRD-API-002
    resolution: Resolved without an audit exception by pinning the workspace to fast-uri 3.1.4, adding a lockfile regression test that rejects every older fast-uri package and rerunning the high-severity Node audit successfully.

  - id: SEC-003
    status: resolved
    severity: high
    kind: gap
    decision: implementation
    summary: OpenAPI allows API-token Bearer credentials on API-token write operations, but the audit and idempotency schemas only accept system/local_cli actors and audit actor IDs are constrained to users, so a Bearer write cannot be attributed truthfully.
    locations:
      - specs/contracts/openapi.yaml
      - crates/domain/src/lib.rs
      - migrations/postgres/0001_persistent_identity.sql
      - migrations/postgres/0005_api_token_idempotency.sql
      - migrations/sqlite/0001_persistent_identity.sql
      - migrations/sqlite/0005_api_token_idempotency.sql
      - crates/persistence/src/api_token_repository.rs
    affects:
      - PRD-API-003
      - PRD-IAM-001
      - PRD-IAM-004
      - PRD-IAM-005
      - PRD-DATA-001
      - PRD-DATA-002
      - PRD-DATA-004
      - PRD-NFR-002
      - PRD-NFR-005
    resolution: IAM-038 added forward-only PostgreSQL/SQLite migration 0006 plus typed domain and repository behavior for an api_token actor. User/token actor references are mutually exclusive, the token reference has a restrictive foreign key, idempotency is actor-bound, and shared engine tests prove redacted audit readback without secret material.
