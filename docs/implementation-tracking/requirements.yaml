    note: API-token Create, Patch and Revoke atomically persist their business write, one audit event and actor/method/path/hash-bound replay data on both engines. Patch/Revoke replay the original safe status, ETag and redacted projection for 24 hours even after a later token mutation; conflicts, expiry and audit-once behavior are engine-parity tested. The isolated Create HTTP boundary forwards the optional key and canonical request hash and returns the same contracted 201 headers, body and one-time token for Create or identical replay; Patch/Revoke HTTP and production write composition remain absent.
