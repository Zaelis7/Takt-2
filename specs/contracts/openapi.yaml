openapi: 3.1.0
info:
  title: Takt API
  version: 0.3.0
  summary: Public management and monitoring API for Takt
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: |
    Normative baseline contract for Takt. Every implemented public endpoint must be
    represented here. Problem responses use RFC 9457-style Problem Details.
servers:
  - url: /
tags:
  - name: System
    description: Health and instance capability information.
  - name: Identity
    description: Browser authentication, sessions and account recovery.
  - name: Monitors
    description: Monitor configuration, execution and results.
  - name: Probes
    description: Remote probe inventory and enrollment.
  - name: Automation
    description: Declarative validation, planning and apply.
  - name: Public Status
    description: Redacted endpoints intended for anonymous status consumers.
security:
  - bearerAuth: []
  - sessionCookie: []
paths:
  /health/live:
    get:
      tags: [System]
      operationId: getLiveness
      summary: Check whether the server process is alive
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "429":
          $ref: "#/components/responses/Problem"
  /health/ready:
    get:
      tags: [System]
      operationId: getReadiness
      summary: Check whether the instance is ready to serve traffic
      security: []
      responses:
        "200":
          description: Instance is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/Problem"
  /api/v1/system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: Get non-secret instance capabilities
      responses:
        "200":
          description: Non-secret system capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        "401":
          $ref: "#/components/responses/Problem"
  /api/v1/auth/login:
    post:
      tags: [Identity]
      operationId: login
      summary: Start a browser session with local credentials
      description: Invalid credentials use an identical response for an unknown username and an invalid password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session with a rotated session cookie
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/InvalidRequestProblem"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "422":
          $ref: "#/components/responses/ValidationProblem"
        "429":
          $ref: "#/components/responses/RateLimitProblem"
  /api/v1/auth/logout:
    post:
      tags: [Identity]
      operationId: logout
      summary: Revoke the current browser session
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Session revoked
          headers:
            Set-Cookie:
              $ref: "#/components/headers/ExpiredSessionCookie"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/CsrfProblem"
        "429":
          $ref: "#/components/responses/RateLimitProblem"
  /api/v1/auth/session:
    get:
      tags: [Identity]
      operationId: getSession
      summary: Get the current browser session and CSRF token
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current browser session
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "429":
          $ref: "#/components/responses/RateLimitProblem"
  /api/v1/auth/recovery/request:
    post:
      tags: [Identity]
      operationId: requestPasswordRecovery
      summary: Request a one-time password recovery token
      description: The response is identical whether or not the account exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordRecoveryRequest"
      responses:
        "202":
          description: Recovery request accepted without disclosing account existence
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "400":
          $ref: "#/components/responses/InvalidRequestProblem"
        "422":
          $ref: "#/components/responses/ValidationProblem"
        "429":
          $ref: "#/components/responses/RateLimitProblem"
  /api/v1/auth/recovery/complete:
    post:
      tags: [Identity]
      operationId: completePasswordRecovery
      summary: Replace a local password with a one-time recovery token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordRecoveryComplete"
      responses:
        "204":
          description: Password replaced and existing sessions revoked
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "400":
          $ref: "#/components/responses/RecoveryCompletionProblem"
        "422":
          $ref: "#/components/responses/ValidationProblem"
        "429":
          $ref: "#/components/responses/RateLimitProblem"
  /api/v1/api-tokens:
    get:
      tags: [Identity]
      operationId: listApiTokens
      summary: List redacted API-token metadata
      description: Results use stable ordering by created_at descending and then id descending.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: project_id
          in: query
          schema:
            $ref: "#/components/schemas/Uuid"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/ApiTokenKind"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApiTokenStatus"
        - name: scope
          in: query
          schema:
            $ref: "#/components/schemas/ApiTokenScope"
      responses:
        "200":
          description: Stable cursor page containing redacted token metadata
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokenPage"
        "400":
          $ref: "#/components/responses/InvalidCursorProblem"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/Problem"
    post:
      tags: [Identity]
      operationId: createApiToken
      summary: Create an API token and reveal its value once
      description: An identical idempotency replay returns the same 201 response with the same token for 24 hours; the opaque value is otherwise returned only by this operation and cannot be retrieved later.
      x-takt-idempotency:
        retention_hours: 24
        scope: [actor, method, path]
        request_hash: required
        identical_replay: same_status_headers_body
        secret_storage: authenticated_encryption
        secret_exposure: create_or_identical_replay_only
        conflict_code: idempotency_key_reused
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfTokenIfSession"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiTokenCreate"
      responses:
        "201":
          description: Token created; this is the only response containing its opaque value
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Location:
              schema:
                type: string
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokenCreated"
        "400":
          $ref: "#/components/responses/InvalidRequestProblem"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/IdempotencyKeyReusedProblem"
        "422":
          $ref: "#/components/responses/ValidationProblem"
  /api/v1/api-tokens/{api_token_id}:
    parameters:
      - $ref: "#/components/parameters/ApiTokenId"
    get:
      tags: [Identity]
      operationId: getApiToken
      summary: Get redacted API-token metadata
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: Redacted token metadata
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiToken"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
    patch:
      tags: [Identity]
      operationId: updateApiToken
      summary: Update non-privilege-bearing API-token metadata
      description: Scopes, kind, organization and project are immutable; replace the token to change its authorization. An identical replay returns the original 200 response, ETag and safe redacted body for 24 hours even if the token was mutated again later.
      x-takt-idempotency:
        retention_hours: 24
        scope: [actor, method, path]
        request_hash: required
        identical_replay: same_status_headers_body
        stored_status: 200
        stored_headers: [ETag]
        stored_body: safe_api_token_snapshot
        conflict_code: idempotency_key_reused
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfTokenIfSession"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/ApiTokenPatch"
      responses:
        "200":
          description: Updated redacted token metadata
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiToken"
        "400":
          $ref: "#/components/responses/InvalidRequestProblem"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/IdempotencyKeyReusedProblem"
        "412":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/ValidationProblem"
    delete:
      tags: [Identity]
      operationId: revokeApiToken
      summary: Revoke an API token
      description: An identical replay returns the original empty 204 response for 24 hours even if the token resource changes later.
      x-takt-idempotency:
        retention_hours: 24
        scope: [actor, method, path]
        request_hash: required
        identical_replay: same_status_headers_body
        stored_status: 204
        stored_headers: []
        stored_body: none
        conflict_code: idempotency_key_reused
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfTokenIfSession"
      responses:
        "204":
          description: Token revoked
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/AuthenticationProblem"
        "403":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/IdempotencyKeyReusedProblem"
        "412":
          $ref: "#/components/responses/Problem"
  /api/v1/projects/{project_id}/monitors:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Monitors]
      operationId: listMonitors
      summary: List monitors in a project
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/MonitorState"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/MonitorKind"
        - name: query
          in: query
          schema:
            type: string
            maxLength: 200
      responses:
        "200":
          description: Page of monitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorPage"
        "400":
          $ref: "#/components/responses/Problem"
        "401":
          $ref: "#/components/responses/Problem"
        "403":
          $ref: "#/components/responses/Problem"
    post:
      tags: [Monitors]
      operationId: createMonitor
      summary: Create a monitor
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitorCreate"
      responses:
        "201":
          description: Monitor created
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          $ref: "#/components/responses/Problem"
        "401":
          $ref: "#/components/responses/Problem"
        "403":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/projects/{project_id}/monitors/{monitor_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MonitorId"
    get:
      tags: [Monitors]
      operationId: getMonitor
      summary: Get a monitor
      responses:
        "200":
          description: Monitor
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "404":
          $ref: "#/components/responses/Problem"
    patch:
      tags: [Monitors]
      operationId: updateMonitor
      summary: Update selected monitor fields
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/MonitorPatch"
      responses:
        "200":
          description: Updated monitor
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "412":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    delete:
      tags: [Monitors]
      operationId: deleteMonitor
      summary: Delete a monitor
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "412":
          $ref: "#/components/responses/Problem"
  /api/v1/projects/{project_id}/monitors/{monitor_id}/checks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MonitorId"
    post:
      tags: [Monitors]
      operationId: runMonitorCheck
      summary: Queue an immediate monitor check
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Check queued
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
  /api/v1/projects/{project_id}/monitors/{monitor_id}/observations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MonitorId"
    get:
      tags: [Monitors]
      operationId: listMonitorObservations
      summary: List recent monitor observations
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Observation page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPage"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/projects/{project_id}/monitors/{monitor_id}/uptime:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MonitorId"
      - name: from
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: bucket
        in: query
        schema:
          type: string
          enum: [raw, minute, hour, day]
          default: hour
    get:
      tags: [Monitors]
      operationId: getMonitorUptime
      summary: Get time-weighted monitor uptime
      responses:
        "200":
          description: Time-weighted uptime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UptimeSummary"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/probes:
    get:
      tags: [Probes]
      operationId: listProbes
      summary: List remote probes
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Probe page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbePage"
        "401":
          $ref: "#/components/responses/Problem"
        "403":
          $ref: "#/components/responses/Problem"
    post:
      tags: [Probes]
      operationId: createProbeEnrollment
      summary: Create a one-time probe enrollment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeEnrollmentCreate"
      responses:
        "201":
          description: One-time enrollment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeEnrollment"
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/config/validate:
    post:
      tags: [Automation]
      operationId: validateConfig
      summary: Validate a declarative configuration
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/config/plan:
    post:
      tags: [Automation]
      operationId: planConfig
      summary: Plan a declarative configuration change
      parameters:
        - name: prune
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Declarative plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigPlan"
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/config/apply:
    post:
      tags: [Automation]
      operationId: applyConfig
      summary: Apply a declarative configuration
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: prune
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Apply operation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /api/public/v1/status-pages/{slug}:
    get:
      tags: [Public Status]
      operationId: getPublicStatusPage
      summary: Get a redacted public status page projection
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Slug"
      responses:
        "200":
          description: Redacted public status projection
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStatusPage"
        "404":
          $ref: "#/components/responses/Problem"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: TaktToken
    sessionCookie:
      type: apiKey
      in: cookie
      name: takt_session
  parameters:
    ApiTokenId:
      name: api_token_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    MonitorId:
      name: monitor_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        maxLength: 2048
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: Session-bound token required for browser state changes.
      schema:
        type: string
        minLength: 32
        maxLength: 512
    CsrfTokenIfSession:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required when the operation is authorized with the browser session cookie; ignored for bearer authentication.
      schema:
        type: string
        minLength: 32
        maxLength: 512
  headers:
    ETag:
      description: Quoted resource version
      schema:
        type: string
    SessionCookie:
      description: Rotated opaque session cookie using HttpOnly, SameSite=Lax, Path=/ and Secure outside explicit localhost mode.
      schema:
        type: string
    ExpiredSessionCookie:
      description: Expired HttpOnly, SameSite=Lax, Path=/ session cookie, retaining Secure outside explicit localhost mode, used to clear browser state.
      schema:
        type: string
    RequestId:
      description: UUIDv7 request correlation identifier.
      schema:
        $ref: "#/components/schemas/Uuid"
    RetryAfter:
      description: Seconds until the client should retry.
      schema:
        type: integer
        minimum: 0
  responses:
    Problem:
      description: Problem Details response
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    IdempotencyKeyReusedProblem:
      description: The same actor reused an Idempotency-Key for the same method and path with a different request hash
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/IdempotencyKeyReusedProblem"
    InvalidRequestProblem:
      description: The request body is malformed or contains unknown fields
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/InvalidRequestProblem"
    InvalidCursorProblem:
      description: The list cursor is invalid, expired or does not match the active filters and sort
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/InvalidCursorProblem"
    AuthenticationProblem:
      description: Authentication failed without disclosing account or session details
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/AuthenticationProblem"
    CsrfProblem:
      description: The session-bound CSRF proof is missing or invalid
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/CsrfProblem"
    RecoveryCompletionProblem:
      description: The recovery request is malformed or its token cannot be accepted
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/InvalidRequestProblem"
              - $ref: "#/components/schemas/RecoveryProblem"
    ValidationProblem:
      description: One or more bounded input fields are invalid
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ValidationProblem"
    RateLimitProblem:
      description: Rate limit exceeded
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/RateLimitProblem"
  schemas:
    Uuid:
      type: string
      format: uuid
    Slug:
      type: string
      pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    SystemInfo:
      type: object
      additionalProperties: false
      required: [version, database, capabilities]
      properties:
        version:
          type: string
        database:
          type: string
          enum: [postgresql, sqlite]
        capabilities:
          type: array
          items:
            type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9](?:[A-Za-z0-9_.-]{0,62}[A-Za-z0-9])?$"
        password:
          type: string
          minLength: 12
          maxLength: 1024
          writeOnly: true
          description: Password input; the runtime enforces a maximum of 1024 UTF-8 bytes.
    PasswordRecoveryRequest:
      type: object
      additionalProperties: false
      required: [username]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9](?:[A-Za-z0-9_.-]{0,62}[A-Za-z0-9])?$"
    PasswordRecoveryComplete:
      type: object
      additionalProperties: false
      required: [token, new_password]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 512
          writeOnly: true
          description: Opaque, one-time and short-lived recovery token.
        new_password:
          type: string
          minLength: 12
          maxLength: 1024
          writeOnly: true
          description: Replacement password; the runtime enforces a maximum of 1024 UTF-8 bytes.
    SessionUser:
      type: object
      additionalProperties: false
      required: [id, username, display_name]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        username:
          type: string
          minLength: 1
          maxLength: 64
        display_name:
          type: string
          minLength: 1
          maxLength: 120
    Session:
      type: object
      additionalProperties: false
      required: [user, permissions, csrf_token, expires_at, absolute_expires_at]
      properties:
        user:
          $ref: "#/components/schemas/SessionUser"
        permissions:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
        csrf_token:
          type: string
          minLength: 32
          maxLength: 512
          description: Session-bound token for the X-CSRF-Token request header.
        expires_at:
          type: string
          format: date-time
          description: Inactivity expiry, 12 hours by default and configurable by the operator.
        absolute_expires_at:
          type: string
          format: date-time
          description: Absolute expiry, 7 days by default and configurable by the operator.
    ApiTokenKind:
      type: string
      enum: [personal, service]
    ApiTokenStatus:
      type: string
      enum: [active, revoked, expired]
    ApiTokenScope:
      type: string
      pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
      maxLength: 100
    IpNetwork:
      type: string
      minLength: 3
      maxLength: 64
      pattern: "^[0-9A-Fa-f:.]+/[0-9]{1,3}$"
      description: Canonical IPv4 or IPv6 CIDR validated by the runtime.
    ApiTokenCreate:
      type: object
      additionalProperties: false
      required: [name, kind, scopes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: "#/components/schemas/ApiTokenKind"
        scopes:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ApiTokenScope"
        project_id:
          $ref: "#/components/schemas/Uuid"
        expires_at:
          type: string
          format: date-time
        ip_networks:
          type: array
          maxItems: 32
          uniqueItems: true
          items:
            $ref: "#/components/schemas/IpNetwork"
    ApiTokenPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        ip_networks:
          type: array
          maxItems: 32
          uniqueItems: true
          items:
            $ref: "#/components/schemas/IpNetwork"
    ApiToken:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - project_id
        - name
        - kind
        - token_prefix
        - scopes
        - ip_networks
        - status
        - expires_at
        - last_used_at
        - revoked_at
        - created_at
        - updated_at
        - version
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        organization_id:
          $ref: "#/components/schemas/Uuid"
        project_id:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: "#/components/schemas/ApiTokenKind"
        token_prefix:
          type: string
          minLength: 8
          maxLength: 32
          pattern: "^takt_[A-Za-z0-9_-]+$"
          description: Non-secret lookup prefix; never sufficient to authenticate.
        scopes:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ApiTokenScope"
        ip_networks:
          type: array
          maxItems: 32
          uniqueItems: true
          items:
            $ref: "#/components/schemas/IpNetwork"
        status:
          $ref: "#/components/schemas/ApiTokenStatus"
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        last_used_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        revoked_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1
    ApiTokenCreated:
      type: object
      additionalProperties: false
      required: [token, api_token]
      properties:
        token:
          type: string
          minLength: 48
          maxLength: 512
          pattern: "^takt_[A-Za-z0-9_-]+$"
          readOnly: true
          description: Opaque bearer token returned only in the successful creation response.
        api_token:
          $ref: "#/components/schemas/ApiToken"
    ApiTokenPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/ApiToken"
        next_cursor:
          type: [string, "null"]
          maxLength: 2048
    MonitorKind:
      type: string
      enum: [http, tcp, dns, icmp, tls, push, browser]
    MonitorState:
      type: string
      enum: [PENDING, UP, DEGRADED, DOWN, PAUSED, MAINTENANCE, UNKNOWN]
    ProbePolicy:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          type: string
          enum: [any, all, quorum]
        min_success:
          type: integer
          minimum: 1
      allOf:
        - if:
            properties:
              mode:
                const: quorum
          then:
            properties:
              min_success:
                type: integer
                minimum: 1
            required: [min_success]
    MonitorCommon:
      type: object
      required:
        - slug
        - name
        - kind
        - enabled
        - schedule_interval_ms
        - timeout_ms
        - failure_threshold
        - recovery_threshold
        - spec
      properties:
        slug:
          $ref: "#/components/schemas/Slug"
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: [string, "null"]
          maxLength: 2000
        kind:
          $ref: "#/components/schemas/MonitorKind"
        enabled:
          type: boolean
        schedule_interval_ms:
          type: integer
          minimum: 10000
          maximum: 86400000
        timeout_ms:
          type: integer
          minimum: 100
          maximum: 300000
        failure_threshold:
          type: integer
          minimum: 1
          maximum: 20
        recovery_threshold:
          type: integer
          minimum: 1
          maximum: 20
        probe_policy:
          $ref: "#/components/schemas/ProbePolicy"
        probe_selector:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          maxItems: 50
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 50
        spec:
          $ref: "#/components/schemas/CheckSpec"
    MonitorCreate:
      allOf:
        - $ref: "#/components/schemas/MonitorCommon"
      unevaluatedProperties: false
    MonitorPatch:
      type: object
      minProperties: 1
      maxProperties: 15
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: [string, "null"]
          maxLength: 2000
        enabled:
          type: boolean
        schedule_interval_ms:
          type: integer
          minimum: 10000
          maximum: 86400000
        timeout_ms:
          type: integer
          minimum: 100
          maximum: 300000
        failure_threshold:
          type: integer
          minimum: 1
          maximum: 20
        recovery_threshold:
          type: integer
          minimum: 1
          maximum: 20
        probe_policy:
          $ref: "#/components/schemas/ProbePolicy"
        probe_selector:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          maxItems: 50
          uniqueItems: true
          items:
            type: string
        spec:
          $ref: "#/components/schemas/CheckSpec"
      additionalProperties: false
    Monitor:
      allOf:
        - $ref: "#/components/schemas/MonitorCommon"
        - type: object
          required: [id, project_id, state, state_since, version, created_at, updated_at]
          properties:
            id:
              $ref: "#/components/schemas/Uuid"
            project_id:
              $ref: "#/components/schemas/Uuid"
            state:
              $ref: "#/components/schemas/MonitorState"
            state_since:
              type: string
              format: date-time
            version:
              type: integer
              minimum: 1
            managed_by:
              type: string
              enum: [manual, declarative, terraform, discovery]
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
      unevaluatedProperties: false
    MonitorPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Monitor"
        next_cursor:
          type: [string, "null"]
    CheckSpec:
      oneOf:
        - $ref: "#/components/schemas/HttpCheckSpec"
        - $ref: "#/components/schemas/TcpCheckSpec"
        - $ref: "#/components/schemas/DnsCheckSpec"
        - $ref: "#/components/schemas/IcmpCheckSpec"
        - $ref: "#/components/schemas/TlsCheckSpec"
        - $ref: "#/components/schemas/PushCheckSpec"
        - $ref: "#/components/schemas/BrowserCheckSpec"
      discriminator:
        propertyName: type
        mapping:
          http: "#/components/schemas/HttpCheckSpec"
          tcp: "#/components/schemas/TcpCheckSpec"
          dns: "#/components/schemas/DnsCheckSpec"
          icmp: "#/components/schemas/IcmpCheckSpec"
          tls: "#/components/schemas/TlsCheckSpec"
          push: "#/components/schemas/PushCheckSpec"
          browser: "#/components/schemas/BrowserCheckSpec"
    SecretRef:
      type: object
      additionalProperties: false
      required: [secret_ref]
      properties:
        secret_ref:
          $ref: "#/components/schemas/Slug"
        key:
          type: string
          minLength: 1
          maxLength: 100
          default: value
      description: Persistent secret reference resolved only at the execution boundary; secret values are never returned.
    ResolverUri:
      type: string
      format: uri
      pattern: "^(?:udp|tcp|tls)://(?![^/?#]*@)[^/?#]+/?$"
      maxLength: 2048
      description: Authority-only DNS resolver URI without credentials, path, query, or fragment.
    AddressFamily:
      type: string
      enum: [auto, ipv4, ipv6]
      default: auto
      description: Address family used to connect to the target, resolver, or proxy; it does not change a DNS record type.
    ProxyBasicAuth:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          $ref: "#/components/schemas/SecretRef"
        password:
          $ref: "#/components/schemas/SecretRef"
    ProxySpec:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url:
          type: string
          format: uri
          pattern: "^(?:http|https|socks5)://(?![^/?#]*@)[^/?#]+/?$"
          maxLength: 2048
          description: Authority-only proxy URL; credentials are forbidden in the URL.
        auth:
          $ref: "#/components/schemas/ProxyBasicAuth"
    HttpValue:
      oneOf:
        - type: string
          maxLength: 1048576
        - $ref: "#/components/schemas/SecretRef"
    JsonPointerAssertion:
      type: object
      additionalProperties: false
      required: [pointer, value]
      properties:
        pointer:
          type: string
          minLength: 1
          maxLength: 1024
        value:
          type: string
          maxLength: 4194304
    HttpBasicAuth:
      type: object
      additionalProperties: false
      required: [type, username, password]
      properties:
        type:
          const: basic
        username:
          $ref: "#/components/schemas/SecretRef"
        password:
          $ref: "#/components/schemas/SecretRef"
    HttpBearerAuth:
      type: object
      additionalProperties: false
      required: [type, token]
      properties:
        type:
          const: bearer
        token:
          $ref: "#/components/schemas/SecretRef"
    HttpMtlsAuth:
      type: object
      additionalProperties: false
      required: [type, client_certificate, client_key]
      properties:
        type:
          const: mtls
        client_certificate:
          $ref: "#/components/schemas/SecretRef"
        client_key:
          $ref: "#/components/schemas/SecretRef"
    HttpAuth:
      oneOf:
        - $ref: "#/components/schemas/HttpBasicAuth"
        - $ref: "#/components/schemas/HttpBearerAuth"
        - $ref: "#/components/schemas/HttpMtlsAuth"
      discriminator:
        propertyName: type
    HttpCheckSpec:
      type: object
      additionalProperties: false
      required: [type, url]
      properties:
        type:
          const: http
        url:
          type: string
          format: uri
          pattern: "^https?://"
          maxLength: 2048
        method:
          type: string
          enum: [GET, HEAD, POST, PUT, PATCH, DELETE, OPTIONS]
          default: GET
        headers:
          type: object
          maxProperties: 50
          propertyNames:
            minLength: 1
            maxLength: 256
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 8192
              - $ref: "#/components/schemas/SecretRef"
        body:
          $ref: "#/components/schemas/HttpValue"
        expected_status_min:
          type: integer
          minimum: 100
          maximum: 599
          default: 200
        expected_status_max:
          type: integer
          minimum: 100
          maximum: 599
          default: 399
        follow_redirects:
          type: integer
          minimum: 0
          maximum: 10
          default: 5
        verify_tls:
          type: boolean
          default: true
        http_version:
          type: string
          enum: [auto, http1_1, http2]
          default: auto
        body_contains:
          type: string
          maxLength: 4194304
        body_matches:
          type: string
          maxLength: 4194304
        json_pointer_equals:
          $ref: "#/components/schemas/JsonPointerAssertion"
        json_pointer_contains:
          $ref: "#/components/schemas/JsonPointerAssertion"
        max_response_time_ms:
          type: integer
          minimum: 1
          maximum: 300000
        response_body_limit_bytes:
          type: integer
          minimum: 1
          maximum: 1048576
          default: 1048576
        auth:
          $ref: "#/components/schemas/HttpAuth"
        proxy:
          $ref: "#/components/schemas/ProxySpec"
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
    TcpCheckSpec:
      type: object
      additionalProperties: false
      required: [type, host, port]
      properties:
        type:
          const: tcp
        host:
          type: string
          minLength: 1
          maxLength: 253
        port:
          type: integer
          minimum: 1
          maximum: 65535
        send_text:
          type: string
          maxLength: 4096
          description: UTF-8 text encoded to send_bytes for the Probe contract; the runtime enforces the 4096-byte limit.
        expect_prefix:
          type: string
          maxLength: 4096
          description: UTF-8 text encoded to bytes for the Probe contract; the runtime enforces the 4096-byte limit.
        proxy:
          $ref: "#/components/schemas/ProxySpec"
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
    DnsCheckSpec:
      type: object
      additionalProperties: false
      required: [type, name, record_type]
      properties:
        type:
          const: dns
        name:
          type: string
          minLength: 1
          maxLength: 253
        record_type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, CAA]
        expected_values:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 4096
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
        expected_rcode:
          type: string
          enum: [NOERROR, NXDOMAIN, SERVFAIL, REFUSED]
          default: NOERROR
        minimum_answers:
          type: integer
          minimum: 0
          maximum: 100
          default: 1
        value_match:
          type: string
          enum: [exact, contains]
          default: contains
    IcmpCheckSpec:
      type: object
      additionalProperties: false
      required: [type, host]
      properties:
        type:
          const: icmp
        host:
          type: string
          minLength: 1
          maxLength: 253
        packets:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
        required_successes:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
        max_latency_ms:
          type: integer
          minimum: 1
          maximum: 300000
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
    TlsCheckSpec:
      type: object
      additionalProperties: false
      required: [type, host]
      properties:
        type:
          const: tls
        host:
          type: string
          minLength: 1
          maxLength: 253
        port:
          type: integer
          minimum: 1
          maximum: 65535
          default: 443
        server_name:
          type: string
          minLength: 1
          maxLength: 253
        warning_days:
          type: integer
          minimum: 1
          maximum: 3650
          default: 30
        critical_days:
          type: integer
          minimum: 0
          maximum: 3650
          default: 7
        proxy:
          $ref: "#/components/schemas/ProxySpec"
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
    PushCheckSpec:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          const: push
        grace_ms:
          type: integer
          minimum: 0
          maximum: 86400000
          default: 60000
        allow_get:
          type: boolean
          default: false
    BrowserCheckSpec:
      type: object
      additionalProperties: false
      required: [type, start_url, steps]
      properties:
        type:
          const: browser
        start_url:
          type: string
          format: uri
          pattern: "^https?://"
          maxLength: 2048
        steps:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [action]
            properties:
              action:
                type: string
                enum: [navigate, click, fill, wait, assert_text, assert_url, assert_status]
              selector:
                type: string
                maxLength: 1000
              value:
                oneOf:
                  - type: string
                    maxLength: 4096
                  - $ref: "#/components/schemas/SecretRef"
            additionalProperties: false
            allOf:
              - if:
                  properties:
                    action:
                      const: fill
                  required: [action]
                then:
                  required: [selector, value]
                  properties:
                    selector:
                      type: string
                      maxLength: 1000
                    value:
                      $ref: "#/components/schemas/SecretRef"
        max_network_response_bytes:
          type: integer
          minimum: 1
          maximum: 10485760
          default: 10485760
        screenshot_on_failure_max_bytes:
          type: integer
          minimum: 0
          maximum: 10485760
          default: 1048576
        proxy:
          $ref: "#/components/schemas/ProxySpec"
        resolver:
          $ref: "#/components/schemas/ResolverUri"
        address_family:
          $ref: "#/components/schemas/AddressFamily"
    ObservationOutcome:
      type: string
      enum: [SUCCESS, TARGET_FAILURE, PROBE_FAILURE, CANCELLED]
    Observation:
      type: object
      additionalProperties: false
      required: [id, monitor_id, outcome, started_at, finished_at, duration_ms, late]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        monitor_id:
          $ref: "#/components/schemas/Uuid"
        probe_id:
          type: [string, "null"]
          format: uuid
        outcome:
          $ref: "#/components/schemas/ObservationOutcome"
        error_code:
          type: [string, "null"]
        summary:
          type: [string, "null"]
          maxLength: 2000
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          minimum: 0
        late:
          type: boolean
    ObservationPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        next_cursor:
          type: [string, "null"]
    UptimeSummary:
      type: object
      additionalProperties: false
      required: [from, to, total_ms, included_ms, uptime_ratio, degraded_ratio, excluded_ratio, buckets]
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total_ms:
          type: integer
          minimum: 0
        included_ms:
          type: integer
          minimum: 0
        uptime_ratio:
          type: number
          minimum: 0
          maximum: 1
        degraded_ratio:
          type: number
          minimum: 0
          maximum: 1
        excluded_ratio:
          type: number
          minimum: 0
          maximum: 1
        buckets:
          type: array
          items:
            type: object
            required: [from, to, state]
            properties:
              from:
                type: string
                format: date-time
              to:
                type: string
                format: date-time
              state:
                $ref: "#/components/schemas/MonitorState"
    Probe:
      type: object
      additionalProperties: false
      required: [id, slug, display_name, labels, status, version]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        slug:
          $ref: "#/components/schemas/Slug"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        labels:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: [pending, connected, disconnected, offline, revoked, incompatible]
        last_seen_at:
          type: [string, "null"]
          format: date-time
        version:
          type: string
    ProbePage:
      type: object
      required: [items, next_cursor]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Probe"
        next_cursor:
          type: [string, "null"]
    ProbeEnrollmentCreate:
      type: object
      additionalProperties: false
      required: [slug, display_name]
      properties:
        slug:
          $ref: "#/components/schemas/Slug"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        labels:
          type: object
          maxProperties: 50
          additionalProperties:
            type: string
    ProbeEnrollment:
      type: object
      additionalProperties: false
      required: [probe_id, enrollment_code, expires_at, server_url]
      properties:
        probe_id:
          $ref: "#/components/schemas/Uuid"
        enrollment_code:
          type: string
          writeOnly: true
        expires_at:
          type: string
          format: date-time
        server_url:
          type: string
          format: uri
    Operation:
      type: object
      additionalProperties: false
      required: [id, kind, status, created_at]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        kind:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        progress:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        created_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
    ValidationResult:
      type: object
      additionalProperties: false
      required: [valid, warnings]
      properties:
        valid:
          type: boolean
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/FieldIssue"
    ConfigPlan:
      type: object
      additionalProperties: false
      required: [plan_id, creates, updates, deletes, unchanged, warnings]
      properties:
        plan_id:
          $ref: "#/components/schemas/Uuid"
        creates:
          type: array
          items:
            $ref: "#/components/schemas/PlanChange"
        updates:
          type: array
          items:
            $ref: "#/components/schemas/PlanChange"
        deletes:
          type: array
          items:
            $ref: "#/components/schemas/PlanChange"
        unchanged:
          type: integer
          minimum: 0
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/FieldIssue"
    PlanChange:
      type: object
      additionalProperties: false
      required: [resource_type, slug]
      properties:
        resource_type:
          type: string
        slug:
          $ref: "#/components/schemas/Slug"
        changes:
          type: array
          items:
            type: object
            required: [path, secret]
            properties:
              path:
                type: string
              before: {}
              after: {}
              secret:
                type: boolean
    PublicStatusPage:
      type: object
      additionalProperties: false
      required: [slug, title, overall_state, components, incidents, updated_at]
      properties:
        slug:
          $ref: "#/components/schemas/Slug"
        title:
          type: string
        overall_state:
          type: string
          enum: [operational, degraded, major_outage, maintenance, unknown]
        components:
          type: array
          items:
            type: object
            required: [name, state]
            properties:
              name:
                type: string
              state:
                $ref: "#/components/schemas/MonitorState"
              uptime_ratio:
                type: [number, "null"]
                minimum: 0
                maximum: 1
        incidents:
          type: array
          items:
            type: object
            required: [id, title, status, impact, updated_at]
            properties:
              id:
                $ref: "#/components/schemas/Uuid"
              title:
                type: string
              status:
                type: string
                enum: [INVESTIGATING, IDENTIFIED, MONITORING, RESOLVED]
              impact:
                type: string
                enum: [none, minor, major, critical]
              updated_at:
                type: string
                format: date-time
        updated_at:
          type: string
          format: date-time
    FieldIssue:
      type: object
      additionalProperties: false
      required: [path, code, message]
      properties:
        path:
          type: string
        code:
          type: string
        message:
          type: string
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, code, request_id]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldIssue"
    InvalidRequestProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 400
            code:
              type: string
              const: invalid_request
    InvalidCursorProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 400
            code:
              type: string
              const: invalid_cursor
    IdempotencyKeyReusedProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 409
            code:
              type: string
              const: idempotency_key_reused
    AuthenticationProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 401
            code:
              type: string
              const: authentication_failed
    CsrfProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 403
            code:
              type: string
              const: csrf_failed
    RecoveryProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 400
            code:
              type: string
              const: recovery_failed
    ValidationProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            status:
              type: integer
              const: 422
            code:
              type: string
              const: validation_failed
    RateLimitProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            code:
              type: string
              const: rate_limit_exceeded
